<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Euro Files</title>
  <link rel="icon" type="image/png" href="assets/images/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css?family=Raleway:300,400,600,700,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

  <!-- Top Navbar -->
  <div class="auth-topbar">
    <a href="index.html" class="navbar-brand">
      <img src="assets/images/logo.png" alt="Euro Files" class="brand-logo">
    </a>
  </div>

  <!-- Login Form -->
  <div class="auth-container">
    <div class="auth-card auth-card-narrow">
      <h2>Sign In</h2>

      <form id="login-form" onsubmit="return handleLogin(event);">
        <div class="form-group">
          <input type="email" id="email" class="form-control input-highlight" placeholder="Email*" required>
        </div>
        <div class="form-group">
          <input type="password" id="password" class="form-control" placeholder="Password*" required>
        </div>

        <div class="form-actions">
          <label>
            <input type="checkbox"> Remember me
          </label>
          <a href="#" class="link-primary">Forgot password?</a>
        </div>

        <!-- Error message area -->
        <div id="login-error" class="form-error form-error-hidden"></div>

        <button type="submit" class="btn btn-primary btn-register" id="login-btn">SIGN IN</button>
      </form>

      <p class="auth-link">
        Don't have an account? <a href="register.html" class="link-primary">Register Free</a>
      </p>
    </div>
  </div>

  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
