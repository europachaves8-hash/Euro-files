<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Euro Files</title>
  <link rel="icon" type="image/png" href="assets/images/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

  <!-- Top Navbar -->
  <div class="auth-topbar">
    <a href="index.html" class="navbar-brand">
      <img src="assets/images/logo.png" alt="Euro Files" class="brand-logo">
    </a>
  </div>

  <!-- Register Form -->
  <div class="auth-container">
    <div class="auth-card">
      <h2>Register</h2>

      <form id="register-form" onsubmit="return handleRegister(event);">
        <!-- Row: Name + Surname -->
        <div class="form-row">
          <div class="form-group">
            <input type="text" id="first_name" class="form-control" placeholder="Name*" required>
          </div>
          <div class="form-group">
            <input type="text" id="last_name" class="form-control" placeholder="Surname*" required>
          </div>
        </div>

        <!-- Phone -->
        <div class="form-group">
          <input type="tel" id="phone" class="form-control" placeholder="Phone">
        </div>

        <!-- Private person checkbox -->
        <div class="form-check">
          <label>
            <input type="checkbox" id="is_private"> I am a private person
          </label>
        </div>

        <!-- Row: Company + Reg Number + VAT -->
        <div class="form-row form-row-3" id="company-fields">
          <div class="form-group">
            <input type="text" id="company" class="form-control" placeholder="Company*">
          </div>
          <div class="form-group">
            <input type="text" id="company_reg" class="form-control" placeholder="Company reg. number">
          </div>
          <div class="form-group">
            <input type="text" id="vat_number" class="form-control" placeholder="VAT number">
          </div>
        </div>

        <!-- Row: Country + City -->
        <div class="form-row">
          <div class="form-group">
            <select id="country" class="form-control" title="Country" required>
              <option value="">Country*</option>
            </select>
          </div>
          <div class="form-group">
            <input type="text" id="city" class="form-control" placeholder="City*" required>
          </div>
        </div>

        <!-- Row: Address + Zip -->
        <div class="form-row">
          <div class="form-group form-group-wide">
            <input type="text" id="address" class="form-control" placeholder="Address*" required>
          </div>
          <div class="form-group form-group-narrow">
            <input type="text" id="zip" class="form-control" placeholder="Zip*" required>
          </div>
        </div>

        <!-- Email (full width, highlighted) -->
        <div class="form-group">
          <input type="email" id="email" class="form-control input-highlight" placeholder="Email*" required>
        </div>

        <!-- Row: Password + Confirm -->
        <div class="form-row">
          <div class="form-group">
            <input type="password" id="password" class="form-control" placeholder="Password*" required minlength="6">
          </div>
          <div class="form-group">
            <input type="password" id="password_confirm" class="form-control" placeholder="Password confirmation*" required minlength="6">
          </div>
        </div>
        <p class="form-hint">Must be at least 6 characters long</p>

        <!-- Privacy checkbox -->
        <div class="form-check">
          <label>
            <input type="checkbox" id="agree_privacy" required> I agree with this site <a href="#" class="link-primary">Privacy Policy</a>
          </label>
        </div>

        <!-- Error message area -->
        <div id="register-error" class="form-error form-error-hidden"></div>

        <!-- Submit -->
        <button type="submit" class="btn btn-primary btn-register" id="register-btn">REGISTER</button>
      </form>

      <p class="auth-link">
        Already have an account? <a href="login.html" class="link-primary">Sign In</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Populate countries
    const countries = [
      "Afghanistan","Albania","Algeria","Andorra","Angola","Argentina","Armenia","Australia","Austria","Azerbaijan",
      "Bahrain","Bangladesh","Belarus","Belgium","Bolivia","Bosnia and Herzegovina","Brazil","Bulgaria","Cambodia",
      "Cameroon","Canada","Chile","China","Colombia","Costa Rica","Croatia","Cuba","Cyprus","Czech Republic",
      "Denmark","Dominican Republic","Ecuador","Egypt","El Salvador","Estonia","Ethiopia","Finland","France",
      "Georgia","Germany","Ghana","Greece","Guatemala","Honduras","Hong Kong","Hungary","Iceland","India",
      "Indonesia","Iran","Iraq","Ireland","Israel","Italy","Jamaica","Japan","Jordan","Kazakhstan","Kenya",
      "Kuwait","Latvia","Lebanon","Libya","Lithuania","Luxembourg","Malaysia","Malta","Mexico","Moldova",
      "Monaco","Montenegro","Morocco","Mozambique","Netherlands","New Zealand","Nicaragua","Nigeria","North Macedonia",
      "Norway","Oman","Pakistan","Panama","Paraguay","Peru","Philippines","Poland","Portugal","Qatar",
      "Romania","Russia","Saudi Arabia","Senegal","Serbia","Singapore","Slovakia","Slovenia","South Africa",
      "South Korea","Spain","Sri Lanka","Sweden","Switzerland","Taiwan","Thailand","Tunisia","Turkey",
      "UAE","Uganda","Ukraine","United Kingdom","United States","Uruguay","Uzbekistan","Venezuela","Vietnam"
    ];
    const countrySelect = document.getElementById('country');
    countries.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      countrySelect.appendChild(opt);
    });

    // Toggle company fields when "private person" is checked
    document.getElementById('is_private').addEventListener('change', function() {
      const fields = document.getElementById('company-fields');
      if (this.checked) {
        fields.style.display = 'none';
        document.getElementById('company').removeAttribute('required');
      } else {
        fields.style.display = '';
        document.getElementById('company').setAttribute('required', '');
      }
    });
  </script>
</body>
</html>
