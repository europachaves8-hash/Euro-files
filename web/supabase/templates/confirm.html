<div style="font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 600px; margin: 0 auto; background: #ffffff;">
  <div style="background: #1a1a1a; padding: 32px; text-align: center; border-radius: 8px 8px 0 0;">
    <img src="https://eurofiles.es/assets/images/logo.png" alt="EUROFILES" style="height: 40px;" />
  </div>
  <div style="padding: 40px 32px; border: 1px solid #e5e5e5; border-top: none;">
    <h2 style="color: #1a1a1a; font-size: 22px; font-weight: 700; margin: 0 0 8px; letter-spacing: -0.3px;">Welcome to EUROFILES</h2>
    <p style="color: #6b7280; font-size: 15px; line-height: 1.6; margin: 0 0 28px;">Thank you for registering. Please confirm your email address to activate your account.</p>
    <div style="text-align: center; margin-bottom: 28px;">
      <a href="{{ .SiteURL }}/auth/confirm?token_hash={{ .TokenHash }}&type=signup" style="display: inline-block; background: #d41920; color: #ffffff; padding: 14px 36px; border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: 700; letter-spacing: 0.3px;">Confirm Email Address</a>
    </div>
    <p style="color: #9ca3af; font-size: 13px; line-height: 1.6; margin: 0;">If you didn't create an account, you can safely ignore this email.</p>
  </div>
  <div style="background: #f9fafb; padding: 20px 32px; border: 1px solid #e5e5e5; border-top: none; border-radius: 0 0 8px 8px; text-align: center;">
    <p style="color: #9ca3af; font-size: 11px; margin: 0;">EUROFILES — Professional ECU Tuning Files</p>
    <p style="color: #d1d5db; font-size: 11px; margin: 4px 0 0;">Open 24/7 &bull; support@eurofiles.es</p>
  </div>
</div>
